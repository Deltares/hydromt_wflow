name: Deploy Multiple Docs Versions

on:
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  multi-version-pages:
    runs-on: ubuntu-latest

    env:
      DOC_VERSIONS: dev v1.0.0 v1.0.1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python / Pixi
        run: |
          pip install --upgrade pip
          pip install pixi  # adjust to your environment

      - name: Build all versions
        run: |
          LATEST_RELEASE=""
          for VERSION in $DOC_VERSIONS; do
            echo "Publishing docs for $VERSION"
            TARGET_DIR="site/$VERSION"
            rm -rf "$TARGET_DIR"
            mkdir -p "$TARGET_DIR"

            if [ "$VERSION" = "dev" ]; then
              # use repo
              pixi run -e docs docs-build-html
              cp -r docs/_build/html/* "$TARGET_DIR/"
            else
              # build from tag
              git fetch --tags
              git checkout "$VERSION"
              pixi run -e docs docs-build-html
              cp -r docs/_build/html/* "$TARGET_DIR/"

              # update latest release if higher version
              if [ -z "$LATEST_RELEASE" ] || [[ "$VERSION" > "$LATEST_RELEASE" ]]; then
                LATEST_RELEASE="$VERSION"
              fi
            fi
          done

          # return to main branch for Pages deployment
          git checkout main

          # Copy /dev to /latest
          rm -rf site/latest
          cp -r site/dev site/latest

          # Copy latest release to /stable
          if [ -n "$LATEST_RELEASE" ]; then
            rm -rf site/stable
            cp -r site/"$LATEST_RELEASE" site/stable
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
