# This is an example TOML configuration file. It is used to test the wflow configuration
# features, and can also be used to work towards an example of what we want the
# configuration file to look like.
# Relative file paths are interpreted as being relative to this TOML file.
# TOML documentation: https://github.com/toml-lang/toml

casename = "wflow_sbm"

calendar = "proleptic_gregorian"
starttime = 2010-02-01T00:00:00
endtime = 2010-02-10T00:00:00
time_units = "days since 1900-01-01 00:00:00"
timestepsecs = 86400

[model]
type = "sbm"
masswasting = true
snow = true
reinit = true
reservoirs = false
lakes = false
glacier = false

# Enable iterations of the kinematic wave
kin_wave_iteration = true
# Fixed sub-timestep for iterations of channel flow (river cells)
kw_river_tstep = 900
# Fixed sub-timestep for iterations of overland flow (land cells)
kw_land_tstep = 3600

thicknesslayers = [100, 300, 800]

[input]
path_forcing = "inmaps.nc"
path_static = "staticmaps.nc"

# these are not directly part of the model
gauges = "gauges"
ldd = "wflow_ldd"
river_location = "rivers"
subcatchment = "subcatch"

# specify the internal IDs of the parameters which vary over time
# the external name mapping needs to be below together with the other mappings
forcing = [
  "vertical.precipitation",
  "vertical.temperature",
  "vertical.potential_evaporation",
]

cyclic = ["vertical.leaf_area_index"]

[input.vertical]
altitude = "altitude"
c = "c"
cf_soil = "cf_soil"
cfmax = "cfmax"
e_r = "e_r"
f = "f"
infiltcappath = "infiltcappath"
infiltcapsoil = "infiltcapsoil"
kext = "kext"
kv_0 = "kv_0"
leaf_area_index = "LAI" # cyclic
m = "M_"
maxleakage = "maxleakage"
pathfrac = "pathfrac"
potential_evaporation = "pet" # forcing
precipitation = "precip" # forcing
rootdistpar = "rootdistpar"
rootingdepth = "rootingdepth"
soilminthickness = "soilminthickness"
soilthickness = "soilthickness"
specific_leaf = "specific_leaf"
storage_wood = "storage_wood"
temperature = "temp" # forcing
tt = "tt"
tti = "tti"
ttm = "ttm"
water_holding_capacity = "water_holding_capacity"
waterfrac = "waterfrac"
"θᵣ" = "theta_r"
"θₛ" = "theta_s"

[input.lateral.river]
length = "river_length"
n = "river_n"
slope = "river_slope"
width = "river_width"

[input.lateral.subsurface]
ksathorfrac = "ksathorfrac"

[input.lateral.land]
n = "land_n"
slope = "land_slope"

[state]
path_input = "instate/instates.nc"
path_output = "run_default/outstate/outstates.nc"

# if listed, the variable must be present in the NetCDF or error
# if not listed, the variable can get a default value if it has one

[state.vertical]
satwaterdepth = "satwaterdepth"
snow = "snow"
tsoil = "tsoil"
ustorelayerdepth = "ustorelayerdepth"
snowwater = "snowwater"
canopystorage = "canopystorage"

[state.lateral.river]
q = "q_river"
h = "h_river"
h_av = "h_av_river"

[state.lateral.subsurface]
ssf = "ssf"

[state.lateral.land]
q = "q_land"
h = "h_land"
h_av = "h_av_land"

[output]
path = "run_default/output.nc"

#[output.vertical]
#satwaterdepth = "satwaterdepth"
#snow = "snow"
#tsoil = "tsoil"
#ustorelayerdepth = "ustorelayerdepth"
#snowwater = "snowwater"
#canopystorage = "canopystorage"

[output.lateral.river]
q_av = "q_river"
#h = "h_river"

#[output.lateral.subsurface]
#ssf = "ssf"

[output.lateral.land]
q = "q_land"
h = "h_land"

[csv]
path = "run_default/output.csv"

[[csv.column]]
header = "Q"
map = "gauges"
parameter = "lateral.river.q_av"
